name: Card launch runner

on:
  schedule:
    # Runs daily; scripts/run.mjs itself decides whether it's actually "due"
    # based on config/settings.json frequencyDays, so change frequency there
    # (or via the force input below) rather than editing this cron line.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if not due yet per frequencyDays"
        type: boolean
        default: true
      frequencyDays:
        description: "Optionally change the check frequency (in days) permanently, e.g. 1 for daily. Leave blank to keep the current value."
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: card-launch-runner
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # "lts/*" tracks whatever LTS is current on the runner image,
          # rather than pinning a specific major that eventually gets
          # deprecated out from under this workflow (as Node 20 just did).
          node-version: "lts/*"

      - name: Run tracker
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RUN: ${{ inputs.force && 'true' || 'false' }}
          FREQUENCY_DAYS_OVERRIDE: ${{ inputs.frequencyDays }}
        run: npm run run

      - name: Commit and push data updates
        run: |
          git config user.name "card-launch-news-bot"
          git config user.email "actions@users.noreply.github.com"
          # mkdir -p first: `git add` hard-fails (exit 128) on a path that
          # doesn't exist on disk at all, which under bash -e would abort
          # this whole step (and silently discard everything the run just
          # did, since it never gets committed/pushed). An existing-but-empty
          # directory is a safe no-op for git add, so this makes the add
          # robust regardless of which paths this particular run touched.
          mkdir -p docs/data data/sitemap-snapshots data/page-hashes data/lastmod-snapshots
          git add docs/data config/settings.json config/tracked-cards.json data/sitemap-snapshots data/page-hashes data/lastmod-snapshots
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "chore: update tracked launches and changes [automated]"

          # This run can take 10+ minutes (Tier 1 fetches ~590 pages), so
          # anything else pushed to main during that window (a code change,
          # a manual edit via GitHub's file editor, etc.) makes a plain
          # `git push` fail with a non-fast-forward rejection. Retry with a
          # rebase on top of whatever's now on main - our commit only
          # touches generated data files, so this should apply cleanly
          # against unrelated code/config changes made elsewhere.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5) - pulling and rebasing before retrying."
            git pull --rebase origin main
          done

          echo "::error::Failed to push after 5 attempts."
          exit 1
